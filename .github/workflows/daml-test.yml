name: Daml CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  daml-build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cn-quickstart/quickstart

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Daml SDK
        uses: actions/cache@v4
        with:
          path: ~/.daml
          key: daml-sdk-3.4.11

      - name: Install Daml SDK 3.4.11
        run: |
          curl -sSL https://get.daml.com/ | sh -s 3.4.11
          echo "$HOME/.daml/bin" >> $GITHUB_PATH

      - name: Build Daml contracts (licensing)
        run: daml build --package-root daml/licensing

      - name: Run Daml tests (all)
        run: daml test --package-root daml/licensing-tests
        timeout-minutes: 5

  backend-build:
    needs: daml-build-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cn-quickstart/quickstart

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Daml Java bindings + compile backend
        run: ./gradlew :daml:codeGen :backend:compileJava