name: Daml CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Least-privilege permissions: read-only for the repo, none for everything else.
permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: read

jobs:
  daml-build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: cn-quickstart/quickstart

    steps:
      # Pinned to commit SHA for supply-chain integrity.
      # Dependabot auto-bumps these via package-ecosystem: github-actions.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Java 21
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6a12 # v4.7.1
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Daml SDK
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.daml
          key: daml-sdk-3.4.11

      - name: Install Daml SDK 3.4.11
        run: |
          curl -sSL https://get.daml.com/ | sh -s 3.4.11
          echo "$HOME/.daml/bin" >> $GITHUB_PATH

      - name: Build Daml contracts (licensing)
        run: daml build --package-root daml/licensing

      - name: Run Daml tests (all)
        run: daml test --package-root daml/licensing-tests
        timeout-minutes: 5

  backend-build:
    needs: daml-build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: cn-quickstart/quickstart

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Java 21
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6a12 # v4.7.1
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@db31548e1066deb3cf1efeb5fe17f2800c7e3bed # v3.4.2

      - name: Generate Daml Java bindings + compile backend
        run: ./gradlew :daml:codeGen :backend:compileJava

  frontend-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: cn-quickstart/quickstart/frontend

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cn-quickstart/quickstart/frontend/package-lock.json

      - run: npm ci

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend-test:
    needs: daml-build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: cn-quickstart/quickstart

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Java 21
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6a12 # v4.7.1
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@db31548e1066deb3cf1efeb5fe17f2800c7e3bed # v3.4.2

      - name: Compile + test backend
        run: ./gradlew :backend:test