<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- SECURITY (audit H9): Content-Security-Policy restricts where scripts,
         styles, and connections may load from, providing defense-in-depth against
         XSS. script-src allows the CDN (Bootstrap) and inline module scripts
         (Vite dev). connect-src is restricted to 'self' so tokens/data cannot be
         exfiltrated to third-party origins. Note: frame-ancestors is ignored in
         meta tags (must be set as HTTP response header); included here as
         documentation only. For full enforcement set CSP via nginx/backend headers. -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data:; font-src 'self' https://cdn.jsdelivr.net; connect-src 'self'; base-uri 'self'; form-action 'self';" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <!-- Load Bootstrap via CDN (audited M12: upgraded 5.0.2 → 5.3.3) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <title>CantonVault — Privacy-first conditional commitments on Canton</title>
    <meta name="description" content="CantonVault: a Daml primitive for institutional finance where privacy is an emergent property of the protocol. Two parties commit; a third party sees nothing until disclosure." />
  </head>
  <body>
    <div id="root"></div>
    <!-- Load Bootstrap JS bundle into the body (5.3.3) -->
    <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"
    ></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
