server:
  forward-headers-strategy: NATIVE
  # Review Error settings here and set acceptable values for production use.
  # This configuration is for development purposes.
  error:
    include-message: on_param
    include-binding-errors: on_param
    include-stacktrace: never
    include-path: never
    include-exception: false
  port: ${BACKEND_PORT}

logging:
  level:
    org.apache.coyote.http11.Http11InputBuffer: WARN
    com.digitalasset.quickstart.oauth.Interceptor: INFO
    org.springframework: ERROR
    org.springframework.security: INFO
#    org.springframework.security.web.FilterChainProxy: TRACE

# Demo mode authentication token. When set, /api/demo-session requires
# a matching demoToken in the request body. Leave blank to disable demo auth.
demo:
  token: ${DEMO_TOKEN:}

management:
  endpoints:
    web:
      exposure:
        include: 'health,info,prometheus'
  endpoint:
    health:
      show-details: when-authorized

ledger:
  application-id: ${AUTH_APP_PROVIDER_BACKEND_USER_ID:AppId}
  registry-base-uri: ${REGISTRY_BASE_URI}
  tls-enabled: ${LEDGER_TLS_ENABLED:false}

# Access to the application is restricted to authorized end users from organization (e.g. AppProvider, AppUser) registered as tenant.
# Backend service starts with a single AppProvider internal tenant. Additional tenant registration is available through
# the /admin/tenant-registrations endpoint.
application:
  tenants:
    AppProvider:
      tenantId: AppProvider
      partyId: ${APP_PROVIDER_PARTY}
      internal: true

# CantonVault demo parties. These are the real Canton party ids onboarded on
# the 5N Sandbox DevNet (or LocalNet). They populate the party selectors in the
# UI so operators never paste raw hashes by hand. Override via environment.
canton-vault:
  parties:
    - label: Proposer (Supplier)
      party-id: ${VAULT_PROPOSER_PARTY:}
      role: proposer
    - label: Accepter (Financier)
      party-id: ${VAULT_ACCEPTER_PARTY:}
      role: accepter
    - label: Third party (Arbitrator)
      party-id: ${VAULT_THIRDPARTY_PARTY:}
      role: thirdParty

# CORS: comma-separated origins allowed to call the backend with credentials.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://app-provider.localhost,http://app-provider.localhost:5173}
